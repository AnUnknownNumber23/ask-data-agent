version: "3.8"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  frontend:
    build: ./web
    ports:
      - "5173:5173"
    depends_on:
      - backend

  backend:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    environment:
      - CONFIG_PATH=/app/config/config.yaml
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-sk-placeholder}
      - PG_PASSWORD=${PG_PASSWORD:-dev-password}
    volumes:
      - ./data:/app/data
      - ./config:/app/config

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma
    ports:
      - "8001:8001"
    volumes:
      - chroma_data:/chroma/chroma

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: analysis_agent
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${PG_PASSWORD:-dev-password}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d analysis_agent"]
      interval: 5s
      retries: 5

  llm-proxy:
    image: litellm/litellm
    ports:
      - "8080:8080"
    profiles:
      - production

volumes:
  chroma_data:
  pg_data:
